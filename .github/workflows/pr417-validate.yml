name: Validate PR 417 rebase

on:
  push:
    branches:
      - codex/fix-herdr-web-terminal

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-herdr-web-terminal
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Run focused suite and formatting checks
        shell: bash
        run: |
          uv sync --group dev
          uv run pytest -q test/api/test_terminals.py test/backends/test_herdr_backend.py test/backends/test_tmux_backend.py
          uv run black --check src/cli_agent_orchestrator/api/main.py src/cli_agent_orchestrator/backends/base.py src/cli_agent_orchestrator/backends/herdr_backend.py src/cli_agent_orchestrator/backends/tmux_backend.py test/api/test_terminals.py test/backends/test_herdr_backend.py test/backends/test_tmux_backend.py
          uv run isort --check-only src/cli_agent_orchestrator/api/main.py src/cli_agent_orchestrator/backends/base.py src/cli_agent_orchestrator/backends/herdr_backend.py src/cli_agent_orchestrator/backends/tmux_backend.py test/api/test_terminals.py test/backends/test_herdr_backend.py test/backends/test_tmux_backend.py

      - name: Remove workflow after successful validation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/pr417-validate.yml
          git commit -m "chore: complete PR #417 validation"
          git push origin HEAD:codex/fix-herdr-web-terminal
