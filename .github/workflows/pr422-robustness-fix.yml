name: Apply PR 422 robustness fixes

on:
  push:
    branches:
      - upstream-pr/read-session-output

permissions:
  contents: write

jobs:
  apply-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: upstream-pr/read-session-output
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Harden malformed payload handling and add regression tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          server_path = Path("src/cli_agent_orchestrator/ops_mcp_server/server.py")
          server = server_path.read_text()

          old_terminals = '''        terminals = info.get("terminals", []) if isinstance(info, dict) else []
          if len(terminals) == 1:
              terminal = terminals[0]
              if not terminal.get("id"):
          '''
          new_terminals = '''        if not isinstance(info, dict):
              return {
                  "success": False,
                  "message": f"Session '{session_name}' returned an invalid response payload",
              }
          terminals = info.get("terminals", [])
          if not isinstance(terminals, list) or any(
              not isinstance(terminal, dict) for terminal in terminals
          ):
              return {
                  "success": False,
                  "message": f"Session '{session_name}' returned an invalid terminals payload",
              }
          if len(terminals) == 1:
              terminal = terminals[0]
              if not terminal.get("id"):
          '''
          if old_terminals not in server:
              raise SystemExit("expected terminal-resolution block not found")
          server = server.replace(old_terminals, new_terminals, 1)

          old_output = '''    if not isinstance(data, dict) or "output" not in data:
              return {"success": False, "message": "Read output failed: invalid response payload"}

          output = data["output"]
          total_chars = len(output)
          '''
          new_output = '''    if not isinstance(data, dict) or not isinstance(data.get("output"), str):
              return {"success": False, "message": "Read output failed: invalid response payload"}

          output = data["output"]
          total_chars = len(output)
          '''
          if old_output not in server:
              raise SystemExit("expected output-validation block not found")
          server = server.replace(old_output, new_output, 1)
          server_path.write_text(server)

          test_path = Path("test/ops_mcp_server/test_read_session_output.py")
          tests = test_path.read_text()

          terminal_test_anchor = '''    def test_ambiguous_session_returns_terminal_list(self) -> None:
          '''
          terminal_tests = '''    @pytest.mark.parametrize("terminals", ["not-a-list", [None]])
              def test_invalid_session_terminals_payload_is_rejected(self, terminals) -> None:
                  """Malformed terminal collections return a structured error."""
                  with patch(
                      REQUEST,
                      return_value=_response(json_data={"name": "cao-x", "terminals": terminals}),
                  ) as mock_request:
                      result = _read_session_output_impl(None, "cao-x", "full", None)

                  assert result == {
                      "success": False,
                      "message": "Session 'cao-x' returned an invalid terminals payload",
                  }
                  mock_request.assert_called_once()

              def test_invalid_session_payload_is_rejected(self) -> None:
                  """A non-object session response returns a structured error."""
                  with patch(REQUEST, return_value=_response(json_data=[])) as mock_request:
                      result = _read_session_output_impl(None, "cao-x", "full", None)

                  assert result == {
                      "success": False,
                      "message": "Session 'cao-x' returned an invalid response payload",
                  }
                  mock_request.assert_called_once()

              def test_ambiguous_session_returns_terminal_list(self) -> None:
          '''
          if terminal_test_anchor not in tests:
              raise SystemExit("expected ambiguous-session test anchor not found")
          tests = tests.replace(terminal_test_anchor, terminal_tests, 1)

          output_test_anchor = '''

          @pytest.mark.asyncio
          async def test_read_session_output_tool_delegates_to_impl() -> None:
          '''
          output_tests = '''

              @pytest.mark.parametrize("output", [None, 123, []])
              def test_non_string_output_payload_is_rejected(self, output) -> None:
                  """A non-string output value returns the documented structured error."""
                  with patch(
                      REQUEST,
                      return_value=_response(json_data={"output": output, "mode": "full"}),
                  ):
                      result = _read_session_output_impl("term-1", None, "full", None)

                  assert result == {
                      "success": False,
                      "message": "Read output failed: invalid response payload",
                  }


          @pytest.mark.asyncio
          async def test_read_session_output_tool_delegates_to_impl() -> None:
          '''
          if output_test_anchor not in tests:
              raise SystemExit("expected async-wrapper test anchor not found")
          tests = tests.replace(output_test_anchor, output_tests, 1)
          test_path.write_text(tests)
          PY

      - name: Run targeted checks
        shell: bash
        run: |
          uv sync --group dev
          uv run pytest -q test/ops_mcp_server/test_read_session_output.py
          uv run black --check src/cli_agent_orchestrator/ops_mcp_server/server.py test/ops_mcp_server/test_read_session_output.py
          uv run isort --check-only src/cli_agent_orchestrator/ops_mcp_server/server.py test/ops_mcp_server/test_read_session_output.py

      - name: Commit and push fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/pr422-robustness-fix.yml
          git add src/cli_agent_orchestrator/ops_mcp_server/server.py test/ops_mcp_server/test_read_session_output.py
          git commit -m "fix(ops-mcp): harden session output payload validation"
          git push origin HEAD:upstream-pr/read-session-output
