name: Full E2E Integration Tests

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider to test with'
        required: false
        default: 'claude_code'
        type: choice
        options:
          - claude_code
          - kiro_cli
          - q_cli

# Manual trigger only — these tests launch real agent sessions
# and require CLI providers to be installed and authenticated

permissions:
  contents: read

jobs:
  full-e2e:
    name: Full E2E (${{ inputs.provider || 'claude_code' }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: web

      - name: Build web UI
        run: npm run build
        working-directory: web

      - name: Start CAO server
        run: |
          uv run cao-server &
          sleep 5
          curl -s http://localhost:9889/health

      - name: Run full Playwright E2E suite
        run: npx playwright test e2e/ --reporter=list --timeout=120000
        working-directory: web

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-full-report
          path: web/test-results/
          retention-days: 7
