name: Add PR 417 changelog entry

on:
  push:
    branches:
      - codex/fix-herdr-web-terminal

permissions:
  contents: write

jobs:
  update-changelog:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-herdr-web-terminal
          fetch-depth: 0

      - name: Add fresh Unreleased section
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("CHANGELOG.md")
          text = path.read_text()
          marker = "## [2.3.0] - 2026-07-12"
          entry = (
              "## [Unreleased]\n\n"
              "### Fixed\n\n"
              "- web: attach web terminals through the configured backend so "
              "herdr-backed terminals no longer fail to attach (#417)\n\n"
          )
          if entry not in text:
              if marker not in text:
                  raise SystemExit(f"changelog marker not found: {marker}")
              text = text.replace(marker, entry + marker, 1)
              path.write_text(text)
          PY

      - name: Commit result and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/pr417-changelog.yml
          git add CHANGELOG.md
          git commit -m "docs: add PR #417 changelog entry"
          git push origin HEAD:codex/fix-herdr-web-terminal
